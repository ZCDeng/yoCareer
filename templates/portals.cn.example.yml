# yoCareer 国内招聘扫描配置（中国默认版）
# 复制到项目根目录为 portals.yml 使用。
#
# 默认策略：
# 1) company_page：公司公开招聘页（主渠道）
# 2) manual_signal_import：用户导入社媒/社区信号
# 3) reach_signal_search：可选公开信号检索（需配置 bridge）
#
# 合规基线：
# - 不做登录自动化、验证码绕过、账号态抓取、批量私信或批量投递
# - 只处理公开页面与用户手动导入内容

title_filter:
  positive:
    # AI / engineering
    - "AI"
    - "AIGC"
    - "大模型"
    - "生成式AI"
    - "生成式 AI"
    - "智能体"
    - "Agent"
    - "算法"
    - "机器学习"
    - "深度学习"
    - "NLP"
    - "多模态"
    - "推荐"
    - "搜索"
    - "后端"
    - "平台"
    - "架构师"
    - "解决方案"
    - "数据"
    # product / operations / growth
    - "产品经理"
    - "技术产品"
    - "产品运营"
    - "用户运营"
    - "增长"
    - "商业化"
    - "策略运营"
    - "内容运营"
  negative:
    - "实习"
    - "兼职"
    - "外包"
    - "驻场"
    - "电话销售"
    - "课程顾问"
    - "保险"
    - "主播"
    - "带货"
    - "区块链"
    - "Web3"
  seniority_boost:
    - "高级"
    - "资深"
    - "专家"
    - "负责人"
    - "架构师"
    - "Tech Lead"
    - "Staff"
    - "Principal"
    - "Lead"

# search_queries 会被映射到 reach_signal_search provider。
# 需要配置 YOCAREER_REACH_SIGNAL_SEARCH_CMD 才会实际执行。
search_queries:
  - name: Company Careers — AI/大模型
    platform: web
    query: '"大模型" "招聘" "职位" "AI 工程师"'
    kind: official_job
    default_confidence: 0.74
    default_action: apply_on_official_site
    enabled: true

  - name: Company Careers — 产品/运营
    platform: web
    query: '"AI 产品经理" OR "产品运营" OR "增长运营" 招聘'
    kind: official_job
    default_confidence: 0.72
    default_action: apply_on_official_site
    enabled: true

  - name: Nowcoder — 社招/校招 AI
    platform: web
    query: 'site:nowcoder.com 大模型 算法 后端 产品运营 招聘'
    kind: community_post
    default_confidence: 0.66
    default_action: save_for_manual_review
    enabled: true

  - name: V2EX — 酷工作
    platform: v2ex
    query: 'AI 大模型 后端 平台 产品 招聘'
    kind: community_post
    default_confidence: 0.68
    default_action: save_for_manual_review
    enabled: false

  - name: GitHub hiring mentions
    platform: github
    query: '"AI Engineer" OR "LLM" OR "产品运营 招聘" China hiring'
    kind: community_post
    default_confidence: 0.65
    default_action: save_for_manual_review
    enabled: false

signal_imports:
  - name: Local social signal inbox
    enabled: true
    provider: manual_signal_import
    path: data/signals.ndjson
    notes: "每行一个 JSON。可导入微博、小红书、公众号、社区帖子、招聘者消息等公开信号。"

signal_searches:
  - name: V2EX AI hiring signals
    enabled: true
    provider: reach_signal_search
    platform: v2ex
    query: 'AI 大模型 后端 算法 产品 招聘'
    default_confidence: 0.68
    default_action: save_for_manual_review

  - name: GitHub hiring signals
    enabled: true
    provider: reach_signal_search
    platform: github
    query: '"AI hiring" OR "LLM engineer" OR "产品运营 招聘"'
    default_confidence: 0.65
    default_action: save_for_manual_review

  - name: Weibo AI hiring signals
    enabled: false
    provider: reach_signal_search
    platform: weibo
    query: '"大模型" "招聘" "算法"'
    default_confidence: 0.66
    default_action: save_for_manual_review
    notes: "仅在有合规的微博公开信号 bridge 时启用。"

  - name: Xiaohongshu AI hiring signals
    enabled: false
    provider: reach_signal_search
    platform: xiaohongshu
    query: '"AI 招聘" "大模型 岗位"'
    default_confidence: 0.64
    default_action: save_for_manual_review
    notes: "仅在有合规的小红书公开信号 bridge 时启用。"

