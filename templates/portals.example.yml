# yoCareer China-first Portal Configuration
# Copy to project root as portals.yml.
#
# Default strategy:
# 1) company_page: public company careers pages (primary)
# 2) manual_signal_import: user-provided social/community signals
# 3) reach_signal_search: optional public-signal search (if bridge configured)
#
# Compliance baseline:
# - No automated login/CAPTCHA/account operations on domestic job/social platforms.
# - Focus on public pages and user-provided exports.

title_filter:
  positive:
    # AI / engineering
    - "AI"
    - "AIGC"
    - "大模型"
    - "生成式AI"
    - "生成式 AI"
    - "智能体"
    - "Agent"
    - "算法"
    - "机器学习"
    - "深度学习"
    - "NLP"
    - "多模态"
    - "推荐"
    - "搜索"
    - "后端"
    - "平台"
    - "架构师"
    - "解决方案"
    - "数据"
    # product / operations / growth
    - "产品经理"
    - "技术产品"
    - "产品运营"
    - "用户运营"
    - "增长"
    - "商业化"
    - "策略运营"
    - "内容运营"
  negative:
    - "实习"
    - "兼职"
    - "外包"
    - "驻场"
    - "电话销售"
    - "课程顾问"
    - "保险"
    - "主播"
    - "带货"
    - "区块链"
    - "Web3"
  seniority_boost:
    - "高级"
    - "资深"
    - "专家"
    - "负责人"
    - "架构师"
    - "Tech Lead"
    - "Staff"
    - "Principal"
    - "Lead"

# search_queries are mapped to reach_signal_search provider.
# They work best when YOCAREER_REACH_SIGNAL_SEARCH_CMD is configured.
search_queries:
  - name: Company Careers — AI/大模型
    platform: web
    query: '"大模型" "招聘" "职位" "AI 工程师"'
    kind: official_job
    default_confidence: 0.74
    default_action: apply_on_official_site
    enabled: true

  - name: Company Careers — 产品/运营
    platform: web
    query: '"AI 产品经理" OR "产品运营" OR "增长运营" 招聘'
    kind: official_job
    default_confidence: 0.72
    default_action: apply_on_official_site
    enabled: true

  - name: Nowcoder — 社招/校招 AI
    platform: web
    query: 'site:nowcoder.com 大模型 算法 后端 产品运营 招聘'
    kind: community_post
    default_confidence: 0.66
    default_action: save_for_manual_review
    enabled: true

  - name: V2EX — 酷工作
    platform: v2ex
    query: 'AI 大模型 后端 平台 产品 招聘'
    kind: community_post
    default_confidence: 0.68
    default_action: save_for_manual_review
    enabled: false

  - name: GitHub hiring mentions
    platform: github
    query: '"AI Engineer" OR "LLM" OR "产品运营" China hiring'
    kind: community_post
    default_confidence: 0.65
    default_action: save_for_manual_review
    enabled: false

signal_imports:
  - name: Local social signal inbox
    enabled: true
    provider: manual_signal_import
    path: data/signals.ndjson
    notes: "One JSON object per line. Paste/exported signals from Weibo, Xiaohongshu, WeChat official accounts, community posts, or recruiter messages."

signal_searches:
  - name: V2EX AI hiring signals
    enabled: true
    provider: reach_signal_search
    platform: v2ex
    query: 'AI 大模型 后端 算法 产品 招聘'
    default_confidence: 0.68
    default_action: save_for_manual_review

  - name: GitHub hiring signals
    enabled: true
    provider: reach_signal_search
    platform: github
    query: '"AI hiring" OR "LLM engineer" OR "产品运营 招聘"'
    default_confidence: 0.65
    default_action: save_for_manual_review

  - name: Weibo AI hiring signals
    enabled: false
    provider: reach_signal_search
    platform: weibo
    query: '"大模型" "招聘" "算法"'
    default_confidence: 0.66
    default_action: save_for_manual_review
    notes: "Enable only when you have a compliant public-signal bridge for Weibo."

  - name: Xiaohongshu AI hiring signals
    enabled: false
    provider: reach_signal_search
    platform: xiaohongshu
    query: '"AI 招聘" "大模型 岗位"'
    default_confidence: 0.64
    default_action: save_for_manual_review
    notes: "Enable only when you have a compliant public-signal bridge for Xiaohongshu."

