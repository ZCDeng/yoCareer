name: Dependency Review
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check dependency graph status
        id: depgraph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status="$(gh api repos/${GITHUB_REPOSITORY} --jq '.security_and_analysis.dependency_graph.status // "disabled"')"
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          if [ "${status}" != "enabled" ]; then
            echo "::warning::Dependency graph is not enabled for ${GITHUB_REPOSITORY}; skipping dependency review gate. Enable it in Settings > Security & analysis."
          fi

      - name: Dependency Review
        if: steps.depgraph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
