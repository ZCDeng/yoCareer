<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yoCareer</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.3.0/dist/fuse.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>yoCareer</h1>
      <div class="header-meta">
        <span id="daemon-status" class="badge">Checking...</span>
        <button id="btn-cmdk" class="btn-cmdk">⌘K</button>
      </div>
    </header>

    <nav class="app-nav">
      <button class="nav-item active" data-module="profile">Profile</button>
      <button class="nav-item" data-module="portals">Portals</button>
      <button class="nav-item" data-module="signals">Signals</button>
      <button class="nav-item" data-module="applications">Applications</button>
      <button class="nav-item" data-module="evaluations">Evaluations</button>
    </nav>

    <div class="hero" id="hero" aria-label="yoCareer brand">
      <svg viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="hero-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--mf-surface, #171717)"/>
            <stop offset="100%" stop-color="var(--mf-bg, #0a0a0a)"/>
          </linearGradient>
          <linearGradient id="stream-1" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0"/>
            <stop offset="30%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0.25"/>
            <stop offset="70%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="stream-2" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0"/>
            <stop offset="20%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0.12"/>
            <stop offset="80%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0"/>
            <stop offset="50%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="var(--mf-accent, #4a9eff)" stop-opacity="0"/>
          </linearGradient>
          <filter id="blur-soft">
            <feGaussianBlur stdDeviation="24"/>
          </filter>
        </defs>
        <rect width="1200" height="480" fill="url(#hero-bg)"/>
        <ellipse cx="600" cy="240" rx="400" ry="140" fill="url(#glow)" filter="url(#blur-soft)"/>
        <g fill="none" stroke-width="2" stroke-linecap="round">
          <path d="M -20 180 Q 300 120 600 200 T 1220 160" stroke="url(#stream-1)"/>
          <path d="M -20 220 Q 280 260 600 200 T 1220 240" stroke="url(#stream-2)"/>
          <path d="M -20 260 Q 320 320 600 200 T 1220 280" stroke="url(#stream-2)"/>
          <path d="M -20 140 Q 260 80 600 200 T 1220 120" stroke="url(#stream-2)" opacity="0.5"/>
          <path d="M -20 300 Q 340 360 600 200 T 1220 320" stroke="url(#stream-2)" opacity="0.5"/>
        </g>
        <g fill="var(--mf-accent, #4a9eff)">
          <circle cx="180" cy="160" r="2.5" opacity="0.6"/>
          <circle cx="380" cy="140" r="2" opacity="0.4"/>
          <circle cx="520" cy="185" r="3" opacity="0.7"/>
          <circle cx="680" cy="210" r="2.5" opacity="0.5"/>
          <circle cx="860" cy="180" r="2" opacity="0.4"/>
          <circle cx="1020" cy="170" r="2.5" opacity="0.3"/>
          <circle cx="140" cy="240" r="2" opacity="0.4"/>
          <circle cx="340" cy="255" r="2.5" opacity="0.5"/>
          <circle cx="580" cy="200" r="3" opacity="0.8"/>
          <circle cx="780" cy="220" r="2" opacity="0.4"/>
          <circle cx="960" cy="230" r="2.5" opacity="0.5"/>
          <circle cx="1140" cy="245" r="2" opacity="0.3"/>
          <circle cx="220" cy="300" r="2" opacity="0.3"/>
          <circle cx="420" cy="310" r="2.5" opacity="0.4"/>
          <circle cx="640" cy="200" r="2" opacity="0.5"/>
          <circle cx="880" cy="270" r="2.5" opacity="0.4"/>
          <circle cx="1080" cy="290" r="2" opacity="0.3"/>
        </g>
        <g stroke="var(--mf-accent, #4a9eff)" fill="none" opacity="0.15">
          <ellipse cx="600" cy="240" rx="90" ry="90" stroke-width="1"/>
          <ellipse cx="600" cy="240" rx="60" ry="60" stroke-width="1"/>
          <ellipse cx="600" cy="240" rx="30" ry="30" stroke-width="1"/>
        </g>
        <circle cx="600" cy="240" r="6" fill="var(--mf-accent, #4a9eff)" opacity="0.9"/>
        <circle cx="600" cy="240" r="14" fill="none" stroke="var(--mf-accent, #4a9eff)" stroke-width="1" opacity="0.3"/>
        <text x="600" y="335" text-anchor="middle"
              fill="var(--mf-text, #e8e8e8)"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
              font-size="22" font-weight="600" letter-spacing="0.05em"
              opacity="0.9">
          yoCareer
        </text>
        <text x="600" y="365" text-anchor="middle"
              fill="var(--mf-text-muted, #888)"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
              font-size="13" font-weight="400"
              opacity="0.7">
          AI Job Search Pipeline
        </text>
      </svg>
    </div>

    <main id="main-content">
      <div class="empty-state">
        <p>Select a module to get started. Press ⌘K for commands.</p>
      </div>
    </main>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
