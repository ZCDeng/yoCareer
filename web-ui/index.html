<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yoCareer · localhost dashboard</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">yoCareer · <span class="muted">localhost dashboard</span></div>
  <nav class="tabs">
    <button data-tab="apps" class="tab active">Applications</button>
    <button data-tab="reports" class="tab">Reports</button>
    <button data-tab="pipeline" class="tab">Pipeline</button>
    <button data-tab="output" class="tab">CV PDFs</button>
  </nav>
  <div class="metrics" id="metrics"><span class="muted">loading…</span></div>
</header>

<main class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <section class="viewer" id="viewer">
    <div class="empty">Select an item from the left.</div>
  </section>
</main>

<footer class="footnote">
  <span class="muted">Read-only · 127.0.0.1 only · Mutations stay in the CLI</span>
</footer>

<script src="/main.js"></script>
</body>
</html>
